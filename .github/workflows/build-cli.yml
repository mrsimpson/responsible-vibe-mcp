name: Build CLI Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-cli:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64,windows/amd64
          - runner: macos-latest
            platform: darwin/arm64,darwin/amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: |
          pnpm add @rollup/rollup-linux-x64-gnu --save-dev || echo "No Linux Rollup dependency needed"
          pnpm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install clihub
        run: go install github.com/thellimist/clihub@latest

      - name: Generate workflows CLI binaries
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          clihub generate \
            --stdio "node packages/cli/dist/index.js" \
            --name workflows \
            --platform ${{ matrix.platform }}

      - name: Sign macOS binaries
        if: runner.os == 'macOS'
        run: find out -type f -exec codesign --sign - --force {} \;

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: out/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
